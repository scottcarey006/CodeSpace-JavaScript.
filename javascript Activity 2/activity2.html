<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sphere Volume Calculator</title>
</head>
<body>

    <h2>Sphere Volume Calculator</h2>

    <!-- Radius input -->
    <label>Radius:</label>
    <input type="number" id="radius">

    <br><br>

    <!-- Volume output (readonly so user can't type in it) -->
    <label>Volume:</label>
    <input type="text" id="volume" readonly>

    <br><br>

    <!-- Button -->
    <button onclick="calculateVolume()">Calculate</button>

    <!-- Link JS -->
    <script src="script.js"></script>

</body>
</html>
